<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEM_FAILURE_DETECTED</title>
    <style>
        body { background: black; color: #ff0000; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .mobile-screen { width: 100%; height: 100%; max-width: 450px; background: #000; padding: 30px; box-sizing: border-box; position: relative; border: 1px solid #333; }
        #console { font-size: 13px; color: #00ff00; white-space: pre-wrap; height: 60%; overflow: hidden; }
        .alert-box { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #f00; color: #fff; width: 85%; padding: 25px; border: 4px solid #fff; text-align: center; z-index: 999; box-shadow: 0 0 50px #f00; }
        .blink { animation: blinker 0.15s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        .progress-bar { width: 100%; background: #222; height: 15px; margin: 15px 0; border: 1px solid #fff; }
        #fill { height: 100%; background: #0f0; width: 0%; transition: width 0.1s; }
    </style>
</head>
<body onclick="launchChaos()">

<div class="mobile-screen">
    <div id="console">>> INITIALIZING SYSTEM SCAN...<br>>> CLICK ANYWHERE TO START DIAGNOSTIC...</div>
    
    <div id="scaryBox" class="alert-box">
        <h1 class="blink">!! WARNING !!</h1>
        <h3 style="margin: 0;">MALWARE DETECTED: TRJN_BCA_BYPASS</h3>
        <p>DELETING PRIVATE DATA & BANKING INFO...</p>
        <div class="progress-bar"><div id="fill"></div></div>
        <h2 id="percent">0%</h2>
        <p style="font-size: 10px;">DO NOT TURN OFF YOUR DEVICE</p>
    </div>
</div>

<script>
    let active = false;
    // Pake suara sirine darurat
    const siren = new Audio('https://www.soundjay.com/buttons/beep-01a.mp3'); 
    siren.loop = true;

    function launchChaos() {
        if(active) return;
        active = true;

        // 1. FULLSCREEN (Minta izin browser)
        const doc = document.documentElement;
        if (doc.requestFullscreen) doc.requestFullscreen();
        else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();

        // 2. SUARA (Mulai bunyi)
        siren.play();

        // 3. GETAR (Vibration API)
        // Getar 200ms, mati 100ms, ulang terus
        if ("vibrate" in navigator) {
            navigator.vibrate([200, 100, 200, 100, 500, 100, 200]);
            setInterval(() => { navigator.vibrate([300, 100, 300]); }, 1000);
        }

        // 4. ANIMASI TEKS
        let con = document.getElementById('console');
        con.innerHTML = ">> EXPLOITING KERNEL...<br>>> ACCESSING CONTACTS...<br>>> STEALING PHOTOS...<br>>> SENDING DATA TO CLOUD...<br>>> [FATAL_ERROR]";
        
        setTimeout(() => {
            document.getElementById('scaryBox').style.display = 'block';
            let p = 0;
            let bar = setInterval(() => {
                if(p < 100) {
                    p++;
                    document.getElementById('percent').innerText = p + "%";
                    document.getElementById('fill').style.width = p + "%";
                } else {
                    clearInterval(bar);
                    document.body.style.background = "red";
                    document.getElementById('scaryBox').innerHTML = "<h1 class='blink'>DEVICE BRICKED</h1><p>Semua data lu udah gue hapus, bngsat!</p>";
                }
            }, 80);
        }, 1500);
    }
</script>
</body>
</html>
